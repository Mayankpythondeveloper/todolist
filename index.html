<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Todo List</title>
    
    <!-- Global Styles -->
    <link rel="stylesheet" href="css/global.css">
    <!-- Animation Styles -->
    <link rel="stylesheet" href="css/animations.css">
    <!-- Navbar Styles -->
    <link rel="stylesheet" href="css/navbar.css">
    <!-- Todo List Styles -->
    <link rel="stylesheet" href="css/todo.css">
    <!-- Responsive Styles -->
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <div class="navbar-brand">
                <span class="brand-icon">📋</span>
                <span class="brand-text">TaskMaster</span>
            </div>
            <ul class="nav-menu">
                <li><a href="#home" class="nav-link active">Home</a></li>
                <li><a href="#tasks" class="nav-link">Tasks</a></li>
                <li><a href="#about" class="nav-link">About</a></li>
            </ul>
            <div class="hamburger">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </div>
    </nav>

    <div class="container">
        <header>
            <h1>📝 My Todo List</h1>
            <p class="subtitle">Stay organized and productive</p>
        </header>

        <div class="input-section">
            <input 
                type="text" 
                id="todoInput" 
                placeholder="Add a new task..." 
                class="todo-input"
            >
            <button id="addBtn" class="add-btn">Add</button>
        </div>

        <div class="filter-section">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">Active</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </div>

        <ul id="todoList" class="todo-list"></ul>

        <footer class="footer">
            <p id="taskCount">0 tasks remaining</p>
            <button id="clearBtn" class="clear-btn">Clear Completed</button>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
